<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout — Atelier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/cart.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <header class="site-header" id="siteHeader">
      <div class="container nav-shell">
        <a href="index.html" class="brand" aria-label="Atelier home">
          <span class="brand-mark">A</span>
          <span class="brand-text">Atelier</span>
        </a>
        <div class="nav-actions">
          <button class="icon-btn" id="themeToggle" aria-label="Toggle color theme">☀</button>
          <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">♡ <span class="count-pill" id="wishlistCount">0</span></a>
          <a href="cart.html" class="icon-btn" aria-label="Shopping cart">🛒 <span class="count-pill" id="cartCount">0</span></a>
        </div>
      </div>
    </header>

    <main class="container page-shell checkout-shell">
      <section class="checkout-form-card">
        <h2>Shipping Details</h2>
        <form id="checkoutForm" class="checkout-form">
          <input type="text" placeholder="Full Name" required />
          <input type="tel" placeholder="Phone" required />
          <input type="email" placeholder="Email" required />
          <input type="text" placeholder="Address" required />
          <input type="text" placeholder="City" required />
          <input type="text" placeholder="State" required />
          <input type="text" placeholder="ZIP" required />
          <input type="text" placeholder="Country" required />
          <div class="payment-options">
            <label><input type="radio" name="payment" value="card" checked /> Credit Card</label>
            <label><input type="radio" name="payment" value="upi" /> UPI</label>
            <label><input type="radio" name="payment" value="cod" /> Cash on Delivery</label>
          </div>
          <button class="btn btn-primary full-width" type="submit">Place Order</button>
        </form>
      </section>
      <aside class="summary-card">
        <h3>Order Summary</h3>
        <div id="checkoutSummary"></div>
      </aside>
    </main>

    <div class="toast" id="toast" aria-live="polite"></div>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
