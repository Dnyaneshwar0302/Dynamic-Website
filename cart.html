<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart — Atelier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/cart.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <header class="site-header" id="siteHeader">
      <div class="container nav-shell">
        <a href="index.html" class="brand" aria-label="Atelier home">
          <span class="brand-mark">A</span>
          <span class="brand-text">Atelier</span>
        </a>
        <div class="nav-actions">
          <button class="icon-btn" id="themeToggle" aria-label="Toggle color theme">☀</button>
          <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">♡ <span class="count-pill" id="wishlistCount">0</span></a>
          <a href="cart.html" class="icon-btn" aria-label="Shopping cart">🛒 <span class="count-pill" id="cartCount">0</span></a>
        </div>
      </div>
    </header>

    <main class="container page-shell">
      <section class="page-heading">
        <p class="eyebrow">Your bag</p>
        <h1>Cart</h1>
      </section>
      <div class="cart-layout">
        <section class="cart-items" id="cartItems"></section>
        <aside class="summary-card">
          <h3>Order Summary</h3>
          <div class="summary-line"><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
          <div class="summary-line"><span>Tax</span><strong id="tax">$0.00</strong></div>
          <div class="summary-line"><span>Shipping</span><strong id="shipping">$0.00</strong></div>
          <div class="summary-line total"><span>Grand Total</span><strong id="grandTotal">$0.00</strong></div>
          <div class="coupon-box">
            <input type="text" placeholder="Coupon code" aria-label="Coupon code" />
            <button class="btn btn-secondary">Apply</button>
          </div>
          <a class="btn btn-primary full-width" href="checkout.html">Proceed to Checkout</a>
        </aside>
      </div>
    </main>

    <div class="toast" id="toast" aria-live="polite"></div>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
